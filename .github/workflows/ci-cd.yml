
# This file lives at: .github/workflows/ci-cd.yml
# GitHub reads this automatically on every push to main branch

name: Food Delivery CI/CD Pipeline

# TRIGGER: When does this pipeline run?
on:
  push:
    branches: [ main ]        # Runs when you push code to main branch
  pull_request:
    branches: [ main ]        # Also runs when someone raises a pull request to main

jobs:
  build-and-test:

    runs-on: ubuntu-latest    # GitHub gives you a fresh Ubuntu Linux machine for free

    steps:

      # STEP 1: Download your code onto the Ubuntu machine
      - name: Checkout code
        uses: actions/checkout@v3
        # Without this, the machine has no code — it's a blank server

      # STEP 2: Install Java 17 on that Ubuntu machine
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'   # Temurin is the free OpenJDK build by Adoptium

      # STEP 3: Run your JUnit tests using Maven
      # THIS IS THE MOST IMPORTANT STEP
      # If even 1 test fails → pipeline stops → Docker image is NOT built → no bad code deployed
      - name: Build and Test with Maven
        run: mvn clean test
        # clean  → deletes old compiled files (fresh start)
        # test   → compiles everything + runs all JUnit tests

      # STEP 4: Package the app into a single JAR file
      - name: Package JAR
        run: mvn package -DskipTests
        # -DskipTests → tests already ran in step 3, no need to run them again
        # This creates: target/food-delivery-1.0.jar

      # STEP 5: Build the Docker image using your Dockerfile
      - name: Build Docker Image
        run: docker build -t yourdockerhubusername/food-delivery:latest .
        # -t → tag/name for the image
        # .  → look for Dockerfile in current directory

      # STEP 6: Login to Docker Hub using your stored secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # secrets.DOCKER_USERNAME → value you saved in GitHub Secrets
          # NEVER write your actual password here in plain text

      # STEP 7: Push the Docker image to Docker Hub
      - name: Push to Docker Hub
        run: docker push yourdockerhubusername/food-delivery:latest
        # After this, your image is live on hub.docker.com
        # Kubernetes will pull it from here during deployment
