# WHY: This file defines the entire CI/CD pipeline.
# GitHub Actions reads this file and runs it automatically on every push.

name: Food Delivery CI/CD Pipeline

# WHY 'on: push'? → Trigger this pipeline whenever code is pushed to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # WHY ubuntu-latest? → Free Linux runner provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from GitHub repository
      - name: Checkout code
        uses: actions/checkout@v3
        # WHY: Without this, the runner has no code to work with

      # Step 2: Set up Java environment
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
        # WHY: The runner starts as a blank machine. We must install Java.

      # Step 3: Build the project and run JUnit tests
      - name: Build and Test with Maven
        run: mvn clean test
        # WHY 'mvn clean test'?
        # 'clean' → removes old build files (fresh build)
        # 'test'  → compiles code + runs all JUnit tests
        # If any test fails → this step fails → pipeline stops → no bad code deployed!

      # Step 4: Package the app into a JAR file
      - name: Package JAR
        run: mvn package -DskipTests
        # WHY -DskipTests? → Tests already ran in previous step, don't repeat

      # Step 5: Build Docker image
      - name: Build Docker Image
        run: docker build -t yourdockerhubuser/food-delivery:latest .
        # WHY: Creates a portable container with our app inside

      # Step 6: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        # WHY secrets? → NEVER hardcode passwords in code. GitHub Secrets stores them safely.

      # Step 7: Push Docker image to Docker Hub
      - name: Push to Docker Hub
        run: docker push yourdockerhubuser/food-delivery:latest
        # WHY push? → Kubernetes will pull this image to deploy our app